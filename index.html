<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>📘 Biblioteca da Princesa Gabriela</title>
  <!-- Fontes e bibliotecas -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Quicksand', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f5ff 0%, #e6edfb 100%);
      min-height: 100vh;
      padding: 20px 16px 0;
      color: #0a1e3c;
    }

    :root {
      --royal: #2a5ac9;
      --royal-light: #5f8aee;
      --royal-soft: #b2c9ff;
      --royal-dark: #1a3f8f;
      --bg-card: #ffffffea;
      --shadow: 0 12px 28px rgba(26, 63, 143, 0.12), 0 4px 12px rgba(0, 20, 60, 0.05);
    }

    .container { max-width: 1280px; margin: 0 auto; }

    /* cabeçalho */
    .royal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 32px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      padding: 16px 28px;
      border-radius: 60px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(65, 105, 225, 0.25);
    }
    .header-title { display: flex; align-items: center; gap: 12px; }
    .header-title i { font-size: 2.4rem; color: var(--royal); }
    .header-title h1 { font-weight: 700; font-size: 2rem; color: #0b2552; }
    .crown-badge { background: var(--royal); color: white; padding: 8px 22px; border-radius: 40px; font-weight: 600; }

    /* botão adicionar e espaçamento */
    .add-section { margin: 30px 0 20px; }
    .add-button {
      background: var(--royal); color: white; padding: 16px 30px; border-radius: 60px;
      font-size: 1.3rem; font-weight: 600; border: none; cursor: pointer;
      box-shadow: 0 10px 18px -4px #1a3f8f80; transition: 0.2s;
    }
    .add-button:hover { background: #1e4bb3; transform: scale(1.02); }

    /* painel formulário */
    .book-form-panel {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-radius: 40px;
      padding: 30px 28px; margin: 30px 0; display: none;
      box-shadow: var(--shadow); border: 1px solid #a7c0fd;
    }
    .book-form-panel.show { display: block; }
    .form-grid { display: grid; gap: 24px; }
    @media (min-width: 640px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .full-width { grid-column: 1 / -1; }
    label { font-weight: 600; color: #102a54; display: block; margin-bottom: 8px; font-size: 1.1rem; }
    input, .fake-file, .cat-checkbox-group {
      width: 100%; padding: 16px 20px; background: white; border: 2px solid #d3e0ff;
      border-radius: 40px; font-size: 1rem; outline: none;
    }
    input:focus { border-color: var(--royal); }
    .file-wrapper { position: relative; }
    .file-wrapper input[type="file"] { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; }
    .fake-file {
      background: #f0f5ff; display: flex; align-items: center; gap: 12px; color: #1a3f8f;
      border: 2px dashed var(--royal-light); cursor: pointer;
    }
    .cat-checkbox-group {
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 8px 10px;
  background: #f9fcff;
  padding: 16px 14px;
  border-radius: 28px;
  border: 1px solid #d3e0ff;
}

.cat-checkbox-group label {
  background: #e9f0ff;
  padding: 6px 14px;
  border-radius: 30px;
  font-weight: 500;
  font-size: 0.85rem;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 0;
  white-space: nowrap;
  border: 1px solid transparent;
  transition: 0.1s;
}

.cat-checkbox-group label:has(input:checked) {
  background: #2a5ac9;
  color: white;
  border-color: #1a3f8f;
}

/* Evita quebra estranha em mobile */
@media (max-width: 600px) {
  .cat-checkbox-group {
    padding: 12px 10px;
    gap: 6px 8px;
  }
  .cat-checkbox-group label {
    padding: 5px 12px;
    font-size: 0.8rem;
  }
}
    .form-actions { display: flex; gap: 20px; justify-content: flex-end; margin-top: 10px; }
    .btn {
      padding: 16px 36px; border-radius: 50px; font-weight: 700; font-size: 1.2rem;
      border: none; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: var(--royal); color: white; box-shadow: 0 8px 16px #1a3f8f60; }
    .btn-secondary { background: #eef3ff; color: #1a3f8f; border: 2px solid #b6ceff; }

    /* coleção */
    .section-title { margin: 40px 0 20px; font-size: 2rem; }
    .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 24px; }
    .book-card { background: var(--bg-card); border-radius: 28px; padding: 18px 14px; box-shadow: var(--shadow); }
    .book-cover { aspect-ratio: 3/4; border-radius: 18px; overflow: hidden; margin-bottom: 14px; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .default-cover { background: linear-gradient(145deg, #2a5ac9, #1e3f8a); color: white; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; height: 100%; }
    .cat-tag { background: var(--royal-soft); padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; }
    .progress-indicator { font-size: 0.9rem; color: var(--royal-dark); margin: 8px 0; }
    .icon-btn { background: #ecf2ff; border: none; border-radius: 30px; padding: 10px; cursor: pointer; font-weight: 600; }

    /* leitor overlay */
    .reader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a1424; z-index: 1000; display: none; flex-direction: column;
    }
    .reader-toolbar {
      display: flex; align-items: center; padding: 10px 16px; background: #102a44; color: white;
      gap: 10px; flex-wrap: wrap;
    }
    .reader-toolbar button {
      background: #2e4e7a; border: none; color: white; padding: 10px 16px;
      border-radius: 30px; font-weight: 600; cursor: pointer;
    }
    #pdfViewerContainer {
      flex: 1; overflow: auto; display: flex; justify-content: center;
      background: #525659; padding: 12px; touch-action: pan-y; 
    }
    #pdfCanvas { max-width: 100%; height: auto; display: block; box-shadow: 0 4px 12px black; background: white; touch-action: none; }
    .highlight-tooltip {
      position: absolute; background: #1e3a6b; border-radius: 40px; padding: 10px 14px;
      display: none; gap: 10px; box-shadow: 0 4px 12px black; z-index: 1100;
    }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

    /* FOOTER RESPONSIVO */
.simple-footer {
  margin-top: 40px;
  padding: 18px 16px;
  text-align: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 30px 30px 18px 18px;
  border-top: 2px solid #2a5ac9;
  box-shadow: 0 -4px 12px rgba(26, 63, 143, 0.06);
  color: #0b2552;
}

.footer-verse {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.footer-verse i {
  color: #2a5ac9;
  font-size: 1rem;
}

.footer-love {
  font-size: 0.95rem;
  font-weight: 500;
  margin-bottom: 4px;
  color: #1a3f8f;
}

.footer-motto {
  font-size: 0.9rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #2a5ac9;
}

.footer-motto i {
  margin: 0 3px;
}

/* Ajuste extra para telas muito pequenas */
@media (max-width: 480px) {
  .simple-footer {
    padding: 14px 10px;
    margin-top: 30px;
  }
  .footer-verse {
    font-size: 0.9rem;
  }
  .footer-love {
    font-size: 0.85rem;
  }
  .footer-motto {
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
}
</style>
  </style>
</head>
<body>
<div class="container" id="mainContainer">
  <header class="royal-header">
    <div class="header-title">
      <i class="fas fa-crown" style="color: #f9c74f;"></i>
      <h1>Biblioteca da <span style="color: var(--royal);">Princesa</span> 👸</h1>
    </div>
    <div class="crown-badge"><i class="fas fa-heart"></i> Gabriela</div>
  </header>

  <div class="add-section">
    <button class="add-button" id="showFormBtn"><i class="fas fa-plus-circle"></i> Adicionar novo livro</button>
  </div>

  <!-- Formulário estilizado -->
  <div class="book-form-panel" id="formPanel">
    <form id="bookForm">
      <div class="form-grid">
        <div><label><i class="fas fa-heading"></i> Título *</label><input type="text" id="bookTitle" required></div>
        <div>
          <label><i class="fas fa-image"></i> Capa (opcional)</label>
          <div class="file-wrapper">
            <div class="fake-file"><i class="fas fa-cloud-upload-alt"></i> Escolher imagem...</div>
            <input type="file" id="coverImage" accept="image/*">
          </div>
        </div>
        <div class="full-width"><label><i class="fas fa-tags"></i> Categorias</label><div class="cat-checkbox-group" id="categoryCheckboxes"></div></div>
        <div class="full-width">
          <label><i class="fas fa-file-pdf"></i> Arquivo PDF *</label>
          <div class="file-wrapper">
            <div class="fake-file"><i class="fas fa-file-pdf"></i> Selecionar PDF</div>
            <input type="file" id="pdfFile" accept=".pdf" required>
          </div>
        </div>
        <div class="form-actions full-width">
          <button type="button" class="btn btn-secondary" id="cancelFormBtn"><i class="fas fa-times"></i> Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar na estante</button>
        </div>
      </div>
    </form>
  </div>

  <h2 class="section-title"><i class="fas fa-bookmark"></i> Minha coleção</h2>
  <div id="booksContainer" class="books-grid"></div>
  <div id="emptyState" style="text-align:center; padding:50px; background:#ffffffb0; border-radius:48px;">✨ Nenhum livro ainda...</div>

  <!-- Footer personalizado -->
  <<footer class="simple-footer">
  <div class="footer-verse">
    <i class="fas fa-book-bible"></i> Josué 24:15 — “Eu e a minha casa serviremos ao Senhor.”
  </div>
  <div class="footer-love">
    Eu e você SEMPRE serviremos ao Senhor, meu amor 
  </div>
  <div class="footer-motto">
    <i class="fas fa-heart" style="color: #c44569;"></i> CORAGEMMMMM! <i class="fas fa-heart" style="color: #c44569;"></i>
  </div>
</footer>

<!-- Leitor overlay -->
<div class="reader-overlay" id="readerOverlay">
  <div class="reader-toolbar">
    <button id="closeReaderBtn"><i class="fas fa-arrow-left"></i> Voltar</button>
    <span id="readerBookTitle">Livro</span>
    <span class="page-info"><span id="currentPage">1</span>/<span id="totalPages">0</span></span>
    <button id="prevPageBtn"><i class="fas fa-chevron-left"></i></button>
    <button id="nextPageBtn"><i class="fas fa-chevron-right"></i></button>
    <button id="toggleHighlightsBtn" title="Mostrar/ocultar marcações"><i class="fas fa-eye"></i> Marcações</button>
  </div>
  <div id="pdfViewerContainer">
    <div style="position: relative; display: inline-block;">
      <canvas id="pdfCanvas"></canvas>
      <div class="highlight-tooltip" id="highlightTooltip">
        <span class="color-dot" style="background:#F9E75C;" data-color="#F9E75C"></span>
        <span class="color-dot" style="background:#FF9A9E;" data-color="#FF9A9E"></span>
        <span class="color-dot" style="background:#A7F3D0;" data-color="#A7F3D0"></span>
        <span class="color-dot" style="background:#BFDBFE;" data-color="#BFDBFE"></span>
        <button id="addNoteBtn" style="background:#2e4e7a; color:white; border:none; padding:6px 16px; border-radius:30px;"><i class="fas fa-pen"></i> Nota</button>
      </div>
    </div>
  </div>
</div>

<script>
  (() => {
    // Categorias
    const CATEGORIES = ["Romance","Aventura","Ação","Drama","Comédia","Suspense","Terror","Mistério","Fantasia","Ficção científica","Filosofia","Psicologia","Autoajuda","Desenvolvimento pessoal","Espiritualidade","Educação","História","Ciência","Tecnologia","Negócios","Finanças","Biografia","Policial","Distopia","Crônicas","Poesia","Religioso"];
    
    // DB
    const DB_NAME = 'PrincessLibraryV4';
    let db;
    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 4);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => { db = req.result; resolve(db); };
        req.onupgradeneeded = (e) => {
          const dbRef = e.target.result;
          if (!dbRef.objectStoreNames.contains('books')) {
            const store = dbRef.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
            store.createIndex('by_title', 'title');
          }
          if (!dbRef.objectStoreNames.contains('highlights')) {
            const hs = dbRef.createObjectStore('highlights', { keyPath: 'id', autoIncrement: true });
            hs.createIndex('bookId', 'bookId');
          }
        };
      });
    }
    async function getDB() { if (!db) await openDB(); return db; }

    // Helpers
    async function saveBook(book) { const database = await getDB(); return new Promise((res,rej) => { const tx = database.transaction('books','readwrite'); const req = tx.objectStore('books').add(book); req.onsuccess = () => res(req.result); req.onerror = rej; }); }
    async function updateBook(id, updates) { const database = await getDB(); const tx = database.transaction('books','readwrite'); const store = tx.objectStore('books'); const getReq = store.get(id); return new Promise((res,rej) => { getReq.onsuccess = () => { const book = getReq.result; if(!book) return rej(); Object.assign(book, updates); store.put(book).onsuccess = () => res(); }; }); }
    async function getAllBooks() { const database = await getDB(); return new Promise(res => { database.transaction('books').objectStore('books').getAll().onsuccess = e => res(e.target.result || []); }); }
    async function getBook(id) { const database = await getDB(); return new Promise(res => { database.transaction('books').objectStore('books').get(id).onsuccess = e => res(e.target.result); }); }
    async function deleteBook(id) { const database = await getDB(); const tx = database.transaction(['books','highlights'],'readwrite'); tx.objectStore('books').delete(id); const idx = tx.objectStore('highlights').index('bookId'); idx.openCursor(IDBKeyRange.only(id)).onsuccess = (e) => { const cursor = e.target.result; if(cursor) { cursor.delete(); cursor.continue(); } }; return new Promise(res => { tx.oncomplete = res; }); }
    async function saveHighlight(hl) { const database = await getDB(); const tx = database.transaction('highlights','readwrite'); tx.objectStore('highlights').add(hl); return new Promise(res => { tx.oncomplete = res; }); }
    async function getHighlights(bookId) { const database = await getDB(); return new Promise(res => { database.transaction('highlights').objectStore('highlights').index('bookId').getAll(bookId).onsuccess = e => res(e.target.result || []); }); }

    // UI Categorias
    const catDiv = document.getElementById('categoryCheckboxes');
    CATEGORIES.forEach(cat => { const l = document.createElement('label'); l.innerHTML = `<input type="checkbox" value="${cat}"> ${cat}`; catDiv.appendChild(l); });
    // Fake file
    document.querySelectorAll('.file-wrapper input[type=file]').forEach(input => {
      input.addEventListener('change', e => { const fake = input.parentElement.querySelector('.fake-file'); fake.innerHTML = input.files.length ? `<i class="fas fa-check"></i> ${input.files[0].name}` : '<i class="fas fa-cloud-upload-alt"></i> Escolher...'; });
    });

    const formPanel = document.getElementById('formPanel');
    document.getElementById('showFormBtn').onclick = () => formPanel.classList.add('show');
    document.getElementById('cancelFormBtn').onclick = () => { formPanel.classList.remove('show'); bookForm.reset(); };
    const bookForm = document.getElementById('bookForm');
    bookForm.onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('bookTitle').value.trim();
      const pdfFile = document.getElementById('pdfFile').files[0];
      if(!title || !pdfFile) return alert('Título e PDF obrigatórios');
      const coverFile = document.getElementById('coverImage').files[0];
      let coverDataURL = null;
      if(coverFile) coverDataURL = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(coverFile); });
      const selectedCats = Array.from(document.querySelectorAll('#categoryCheckboxes input:checked')).map(cb => cb.value);
      const pdfBlob = new Blob([await pdfFile.arrayBuffer()], {type: 'application/pdf'});
      await saveBook({ title, coverDataURL, categories: selectedCats, pdfBlob, currentPage: 1 });
      formPanel.classList.remove('show'); bookForm.reset(); renderBooks();
    };

    async function renderBooks() {
      const books = await getAllBooks();
      const container = document.getElementById('booksContainer');
      const empty = document.getElementById('emptyState');
      empty.style.display = books.length ? 'none' : 'block';
      let html = ''; books.sort((a,b)=>(b.id||0)-(a.id||0));
      for(let b of books) {
        const cover = b.coverDataURL ? `<img src="${b.coverDataURL}">` : `<div class="default-cover"><i class="fas fa-book"></i></div>`;
        const cats = (b.categories||[]).slice(0,3).map(c=>`<span class="cat-tag">${c}</span>`).join('');
        html += `<div class="book-card"><div class="book-cover">${cover}</div><div class="book-title">${escape(b.title)}</div><div class="book-cats">${cats}</div><div class="progress-indicator">📄 Página ${b.currentPage||1}</div><div class="card-actions"><button class="icon-btn read-btn" data-id="${b.id}"><i class="fas fa-book-reader"></i></button><button class="icon-btn download-btn" data-id="${b.id}"><i class="fas fa-download"></i></button><button class="icon-btn delete-btn" data-id="${b.id}"><i class="fas fa-trash"></i></button></div></div>`;
      }
      container.innerHTML = html;
      document.querySelectorAll('.read-btn').forEach(b => b.addEventListener('click', ()=> openReader(Number(b.dataset.id))));
      document.querySelectorAll('.download-btn').forEach(b => b.addEventListener('click', ()=> downloadBook(Number(b.dataset.id))));
      document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', ()=> { if(confirm('Excluir?')) deleteBook(Number(b.dataset.id)).then(renderBooks); }));
    }
    function escape(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    async function downloadBook(id) { const book = await getBook(id); if(!book?.pdfBlob) return; const url = URL.createObjectURL(book.pdfBlob); const a = document.createElement('a'); a.href = url; a.download = `${book.title}.pdf`; a.click(); }

    // ----- LEITOR COM SWIPE E SELEÇÃO FUNCIONAL -----
    let pdfDoc = null, currentBookId = null, currentPageNum = 1, totalPages = 0;
    const canvas = document.getElementById('pdfCanvas'), ctx = canvas.getContext('2d');
    const overlay = document.getElementById('readerOverlay');
    const tooltip = document.getElementById('highlightTooltip');
    let selectedText = '', selectionRect = null, showHighlights = true;

    async function openReader(bookId) {
      currentBookId = bookId; const book = await getBook(bookId); if(!book?.pdfBlob) return;
      document.getElementById('readerBookTitle').textContent = book.title; overlay.style.display = 'flex';
      const arrayBuffer = await book.pdfBlob.arrayBuffer(); pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      totalPages = pdfDoc.numPages; document.getElementById('totalPages').textContent = totalPages;
      currentPageNum = book.currentPage || 1; await renderPage(currentPageNum);
    }

    async function renderPage(num) {
      const page = await pdfDoc.getPage(num); const viewport = page.getViewport({ scale: 1.2 });
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
      document.getElementById('currentPage').textContent = num;
      if(currentBookId) updateBook(currentBookId, { currentPage: num });
      if(showHighlights) await drawSavedHighlights(num);
    }

    async function drawSavedHighlights(pageNum) {
      if(!currentBookId) return; const highlights = await getHighlights(currentBookId);
      ctx.save(); highlights.filter(h=>h.page===pageNum).forEach(h=>{ if(!h.rects) return; ctx.fillStyle = h.color+'60'; h.rects.forEach(r=>ctx.fillRect(r.x, r.y, r.w, r.h)); }); ctx.restore();
    }

    // Swipe
    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
    canvas.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff < 0 && currentPageNum < totalPages) { currentPageNum++; renderPage(currentPageNum); }
        else if (diff > 0 && currentPageNum > 1) { currentPageNum--; renderPage(currentPageNum); }
      }
    });

    // Seleção de texto funcional (sem bloqueio)
    function showTooltip() {
      const sel = window.getSelection(); selectedText = sel.toString().trim();
      if(!selectedText || sel.rangeCount===0) { tooltip.style.display = 'none'; return; }
      const range = sel.getRangeAt(0); const rect = range.getBoundingClientRect();
      const canvasRect = canvas.getBoundingClientRect();
      if(rect.left < canvasRect.left || rect.right > canvasRect.right) { tooltip.style.display = 'none'; return; }
      tooltip.style.display = 'flex'; tooltip.style.left = (rect.left + window.scrollX) + 'px'; tooltip.style.top = (rect.bottom + window.scrollY + 8) + 'px';
      const rects = []; for(let r of range.getClientRects()) rects.push({ x: r.left - canvasRect.left, y: r.top - canvasRect.top, w: r.width, h: r.height });
      selectionRect = { rects };
    }
    canvas.addEventListener('mouseup', showTooltip);
    canvas.addEventListener('touchend', (e) => { setTimeout(showTooltip, 50); });
    document.addEventListener('click', e => { if(!tooltip.contains(e.target) && !canvas.contains(e.target)) tooltip.style.display = 'none'; });
    tooltip.addEventListener('click', e => e.stopPropagation());

    document.querySelectorAll('.color-dot').forEach(d => d.onclick = async (e) => {
      const color = e.target.dataset.color; if(!selectedText) return alert('Selecione um trecho');
      const note = prompt('💬 Nota/reflexão (opcional):');
      await saveHighlight({ bookId: currentBookId, page: currentPageNum, text: selectedText, color, note: note||'', rects: selectionRect.rects });
      tooltip.style.display = 'none'; renderPage(currentPageNum);
    });
    document.getElementById('addNoteBtn').onclick = async () => {
      if(!selectedText) return alert('Selecione um trecho');
      const note = prompt('📝 Reflexão:'); if(note===null) return;
      await saveHighlight({ bookId: currentBookId, page: currentPageNum, text: selectedText, color: '#F9E75C', note, rects: selectionRect.rects });
      tooltip.style.display = 'none'; renderPage(currentPageNum);
    };

    document.getElementById('prevPageBtn').onclick = () => { if(currentPageNum>1) { currentPageNum--; renderPage(currentPageNum); } };
    document.getElementById('nextPageBtn').onclick = () => { if(currentPageNum<totalPages) { currentPageNum++; renderPage(currentPageNum); } };
    document.getElementById('closeReaderBtn').onclick = () => overlay.style.display = 'none';
    document.getElementById('toggleHighlightsBtn').onclick = () => { showHighlights = !showHighlights; renderPage(currentPageNum); };

    openDB().then(() => renderBooks());
  })();
</script>
</body>
</html>
